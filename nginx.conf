server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect www to apex when both map to this service
    if ($host = 'www.seniorsafeusa.org') {
        return 301 https://seniorsafeusa.org$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jsx|js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
